name: CI/CD Tienda Perritos ECS

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ---------- COMPILAR Y SUBIR IMÁGENES A ECR ----------
      - name: Build & push BACKEND
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd backend
          docker build -t $ECR_REGISTRY/tienda-perritos-back:latest .
          docker push $ECR_REGISTRY/tienda-perritos-back:latest

      - name: Build & push FRONTEND
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd frontend
          docker build -t $ECR_REGISTRY/tienda-perritos-front:latest .
          docker push $ECR_REGISTRY/tienda-perritos-front:latest

      # ---------- DESPLIEGUE EN ECS ----------
      - name: Desplegar Backend en ECS
        run: |
          aws ecs update-service --cluster tienda-perritos-cluster --service backend-service --force-new-deployment --region us-east-1

      - name: Desplegar Frontend en ECS
        run: |
          aws ecs update-service --cluster tienda-perritos-cluster --service frontend-service --force-new-deployment --region us-east-1
