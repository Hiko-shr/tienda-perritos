name: CI/CD Tienda Perritos ECS

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

env:
  AWS_REGION: us-east-1
  ECR_REPO_FRONTEND: tienda-frontend
  ECR_REPO_BACKEND: tienda-backend
  ECR_REPO_DB: tienda-db
  ECS_CLUSTER: tienda-perritos-cluster         # Nombre de tu Clúster ECS
  ECS_SERVICE_FRONTEND: tienda-frontend-service # Nombre de tu Servicio Frontend
  ECS_SERVICE_BACKEND: tienda-backend-service   # Nombre de tu Servicio Backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1   # <--- Asegúrate de que esta línea esté aquí
          
      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ---------- COMPILAR Y SUBIR IMÁGENES A ECR ----------
      - name: Build & push DB
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd db
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPO_DB }}:latest .
          docker push $ECR_REGISTRY/${{ env.ECR_REPO_DB }}:latest

      - name: Build & push BACKEND
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd backend
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPO_BACKEND }}:latest .
          docker push $ECR_REGISTRY/${{ env.ECR_REPO_BACKEND }}:latest

      - name: Build & push FRONTEND
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd frontend
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPO_FRONTEND }}:latest .
          docker push $ECR_REGISTRY/${{ env.ECR_REPO_FRONTEND }}:latest

      # ---------- DESPLIEGUE AUTOMATIZADO EN ECS ----------
      - name: Desplegar Backend en ECS
        run: |
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE_BACKEND }} --force-new-deployment --region ${{ env.AWS_REGION }}

      - name: Desplegar Frontend en ECS
        run: |
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.ECS_SERVICE_FRONTEND }} --force-new-deployment --region ${{ env.AWS_REGION }}
